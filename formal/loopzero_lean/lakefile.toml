name = "loopzero_lean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LoopzeroLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"

[[lean_lib]]
name = "LoopzeroLean"

[[require]]
name = "lean4checker"
git = "https://github.com/leanprover/lean4checker.git"
rev = "master"